<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sim Race Radio - Overlay</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    :root {
      --cmrt-blue:   #0072ec;
      --cmrt-red:    #e10600;
      --hud-bg:      rgba(10, 11, 16, 0.92);
      --hud-sub:     rgba(24, 26, 37, 0.95);
      --text-main:   #ffffff;
      --text-muted:  #9da2b0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ---- Completely transparent and click-through container ---- */
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent !important;
      font-family: "Inter", system-ui, sans-serif;
      pointer-events: none;
    }

    /* ---- Responsive Widget Backdrop (Shrinks vertically to fit content) ---- */
    #container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;

      backdrop-filter: blur(24px);

      display: flex;
      flex-direction: column;

      background: rgba(0,0,0,0);
      transition: background 120ms 150ms;
    }

    #container.show {
      background: var(--hud-bg);
    }

    .content {
      opacity: 0;
      transform: translateX(-20px);
      transition: transform 220ms cubic-bezier(.2,.9,.2,1) 150ms, opacity 120ms 150ms;
    }

    #container.show .content {
      opacity: 1;
      transform: translateX(0);
    }

    .audio-bar {
        position:absolute;
        left:0;
        top:0;
        width:18px;
        height:100%;

        display:flex;
        flex-direction:column;

        transform-origin: top;

        transform: scaleY(0);
        transition: transform 150ms ease-in-out;
    }

    #container.show .audio-bar {
      transform: scaleY(1);
    }

    .username {
      opacity: 0;
      transform: translateX(20px);
      transition: transform 220ms cubic-bezier(.2,.9,.2,1) 320ms, opacity 120ms 320ms;
    }

    #container.show .username {
      opacity: 1;
      transform: translateX(0px);
    }

    .message-text span {
      will-change: transform, opacity;
    }

    .segment {
        flex:1;

        background:var(--cmrt-blue);

        transform-origin:left;

        transform: scaleX(.2) scaleY(1.1);

        transition:transform 40ms linear;
    }

    /* ---- Slightly Darker Header Meta Strip ---- */
    .card-header {
      background: var(--hud-sub);
      width: 100%;
      padding: 3vw 5vw;
      display: flex;
      align-items: center;
      position: relative;
    }

    /* ---- Corner Branding Layout Elements ---- */
    .overlay-header-label {
      font-size: 2.5vw;
      font-weight: 900;
      color: #fff;
      background: var(--cmrt-red);
      padding: 0.4vw 1.2vw;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1;
    }

    .timestamp {
      margin-left: auto;
      font-size: 2.2vw;
      font-weight: 600;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.5px;
    }

    /* ---- Main Body Padding Room ---- */
    .card-body {
      padding: 5vw 8vw 6vw 6vw;
    }

    /* ---- Central Message Layout Grid ---- */
    .widget-layout {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 5vw;
    }

    /* Left-aligned profile image/avatar scaling */
    .avatar-container {
      width: 14vw;
      height: 14vw;
      flex-shrink: 0;
      position: relative;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 2px solid rgba(255, 255, 255, 0.15);
    }

    .avatar-placeholder {
      width: 100%;
      height: 100%;
      background: #232631;
      border: 2px solid rgba(255, 255, 255, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6vw;
      font-weight: 900;
      color: var(--cmrt-blue);
    }

    /* Content Stack */
    .content-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5vw;
      flex: 1;
      min-width: 0;
      text-align: left;
    }

    /* Mid-Top Username Heading */
    .username {
      font-size: 6.5vw;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase; 
      letter-spacing: 0.5px;
      line-height: 1;

      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Mid-Bottom Message Body */
    .message-text {
      font-size: 3.8vw;
      font-weight: 600;
      line-height: 1.3;
      color: var(--text-main);
      word-break: break-word;
    }
  </style>
</head>
<body>

<div id="container">
  <div class="card-header content">
    <span class="overlay-header-label">Radio</span>
    <span class="timestamp" id="timestamp">—</span>
  </div>
  <div class="audio-bar">
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
    <div class="segment"></div>
  </div>
  <div class="card-body content">
    <div class="widget-layout">
      <div class="avatar-container">
        <div class="avatar-placeholder" id="avatar-ph">?</div>
        <img class="avatar" id="avatar-img" src="" alt="" style="display:none">
      </div>
      
      <div class="content-block">
        <div class="username" id="username">DRIVER NAME</div>
        <div class="message-text" id="msg-text">Message content goes here.</div>
      </div>
    </div>
  </div>
</div>

<script>
  const avatarPh  = document.getElementById("avatar-ph");
  const avatarImg = document.getElementById("avatar-img");
  const username  = document.getElementById("username");
  const msgText   = document.getElementById("msg-text");
  const timestamp = document.getElementById("timestamp");

  const container = document.getElementById("container");
  function showOverlay() {
    container.classList.add("show");
  }

  function hideOverlay() {
    setTimeout(() => { msgText.innerHTML = ""; }, 500);
    container.classList.remove("show");
  }

  function typeWords(el, text, speed = 60) {
      el.textContent = "";

      const words = text.split(" ");
      let i = 0;

      function addWord() {
          if (i >= words.length) return;

          const span = document.createElement("span");
          span.textContent = words[i] + "\u00A0";

          span.style.opacity = "0";
          span.style.transform = "translateX(6px)";

          span.style.display = "inline-block";
          span.style.transition = "opacity 500ms ease, transform 500ms ease";

          el.appendChild(span);

          span.getBoundingClientRect();

          requestAnimationFrame(() => {
              span.style.opacity = "1";
              span.style.transform = "translateX(0)";
          });

          i++;
          setTimeout(addWord, speed);
      }

      addWord();
  }

  // Pure data rendering layout pipeline logic
  function renderMessage(msg) {
    username.textContent = msg.name || "—";
    
    timestamp.textContent = msg.time;

    if (msg.pfp) {
      avatarImg.src = msg.pfp;
      avatarImg.style.display = "block";
      avatarPh.style.display = "none";
    } else {
      avatarPh.textContent = msg.name ? msg.name.charAt(0).toUpperCase() : "?";
      avatarPh.style.display = "flex";
      avatarImg.style.display = "none";
    }

    showOverlay();
    setTimeout(() => { typeWords(msgText, msg.content || ""); }, 320);
  }

  let currentAudio = null;

  const audioCtx = new AudioContext();
  const analyser = audioCtx.createAnalyser();

  analyser.fftSize = 256;

  const bins = new Uint8Array(analyser.frequencyBinCount);

  const audio = new Audio(); // reuse ONE element

  const source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);

  audio.onended = () => {
    // small buffer so it doesn't feel abrupt
    hideTimer = setTimeout(() => {
      hideOverlay();
    }, 1200);
  };

  document.addEventListener("click", async () => {
      await audioCtx.resume();
  });

  function playAudio(url) {
    audio.src = url;
    audio.currentTime = 0;

    audio.play().catch(console.error);
  }
  const segments = document.querySelectorAll(".segment");
  const smoothed = new Array(8).fill(0);

  function animateBar() {
      analyser.getByteFrequencyData(bins);

      for (let band = 0; band < 8; band++) {

          // logarithmic-ish band distribution (fixes bass dominance)
          const startRatio = band / 8;
          const endRatio   = (band + 1) / 8;

          const start = Math.floor((startRatio * startRatio) * bins.length);
          const end   = Math.floor((endRatio * endRatio) * bins.length);

          let sum = 0;

          for (let i = start; i < end; i++) {
              sum += bins[i];
          }

          let level = sum / Math.max(1, end - start);

          // normalize
          level /= 255;

          // perceptual curve (makes mids/highs visible)
          level = Math.pow(level, 1.35);

          // frequency tilt (reduces bass dominance)
          const tilt = band / 7;
          level *= (0.7 + tilt * 1.3);

          // clamp
          level = Math.min(1, level);

          // smoothing (prevents jitter)
          smoothed[band] = smoothed[band] * 0.75 + level * 0.25;

          segments[band].style.transform =
              `scaleX(${0.3 + smoothed[band] * 7}) scaleY(1.1)`;
      }

      requestAnimationFrame(animateBar);
  }

  animateBar();
  hideOverlay();

  const SESSION_KEY = (() => {
    const m = window.location.pathname.match(/^\/o\/([A-Za-z0-9_-]{16})$/);
    return m ? decodeURIComponent(m[1]) : '0000000000000000';
  })();
  const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";

  const ws = new WebSocket(`${protocol}//${location.host}/ws/${SESSION_KEY}`);

  console.log(location.host, SESSION_KEY);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    
    switch (msg.type) {

      case "init":
      case "bulk": {
        window._messages = msg.messages || [];
        break;
      }

      case "new_message": {
        window._messages.unshift(msg.message);
      }

      case "display_message": {
        const id = parseInt(msg.id);

        const m = (window._messages || []).find(x => x.id === id);
        if (!m) return;

        renderMessage(m);
        playAudio(`/audio/${SESSION_KEY}/${msg.id}`)
        break;
      }

      default:
        break;
    }
  };

  ws.onclose = () => {
    console.log("overlay disconnected, retrying...");
    setTimeout(() => location.reload(), 1000);
  };
</script>
</body>
</html>
