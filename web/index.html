<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sim Race Radio — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="theme.css" />
  <style>
    /* ---- Index-page-specific layout ---- */
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .index-root {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-16) var(--space-8);
      gap: var(--space-12);
      position: relative;
      overflow: hidden;
    }

    /* Ambient grid background */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--color-border) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
    }

    /* Red corner accent */
    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 320px; height: 320px;
      background: radial-gradient(circle at top left, var(--color-accent-glow), transparent 70%);
      pointer-events: none;
    }

    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-eyebrow {
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--color-accent);
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: var(--text-4xl);
      font-weight: var(--weight-black);
      letter-spacing: var(--tracking-tight);
      text-transform: uppercase;
      line-height: 0.9;
      color: var(--color-text-primary);
    }

    .hero-title em {
      font-style: normal;
      color: var(--color-accent);
    }

    .hero-sub {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      max-width: 380px;
      line-height: 1.6;
    }

    /* ---- Action cards ---- */
    .action-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-6);
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    .action-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-8) var(--space-6);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--space-4);
      transition: border-color var(--duration-normal) var(--ease-out),
                  box-shadow   var(--duration-normal) var(--ease-out);
    }

    .action-card:hover {
      border-color: var(--color-border-bright);
      box-shadow: 0 4px 32px rgba(0,0,0,0.4);
    }

    .action-card.primary:hover {
      border-color: var(--color-accent);
      box-shadow: 0 4px 32px var(--color-accent-glow);
    }

    .card-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .card-icon.red { background: var(--color-accent-dim); }
    .card-icon.teal { background: var(--color-teal-dim); }

    .card-title {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      text-align: center;
    }

    .card-desc {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      text-align: center;
      line-height: 1.5;
    }

    /* ---- Paste input card ---- */
    .paste-card {
      max-width: 640px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .paste-card .panel {
      padding: var(--space-5) var(--space-6);
    }

    .paste-row {
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    .paste-or {
      display: flex;
      align-items: center;
      gap: var(--space-4);
      margin: var(--space-5) 0;
    }

    .paste-or-text {
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-widest);
      text-transform: uppercase;
      color: var(--color-text-muted);
      white-space: nowrap;
      padding: 0 var(--space-2);
    }

    .paste-or .divider { flex: 1; margin: 0; }

    .paste-hint {
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      text-align: center;
      margin-top: var(--space-3);
      font-family: var(--font-mono);
    }

    /* ---- Paste detection flash ---- */
    #paste-input.detected {
      border-color: var(--color-teal);
      box-shadow: 0 0 0 2px rgba(0,200,170,0.2);
      animation: flash-teal var(--duration-normal) var(--ease-out);
    }

    @keyframes flash-teal {
      0%   { background: rgba(0,200,170,0.15); }
      100% { background: var(--color-bg); }
    }

    /* ---- Footer ---- */
    .footer {
      padding: var(--space-4) var(--space-8);
      border-top: 1px solid var(--color-border);
      display: flex;
      justify-content: center;
      gap: var(--space-6);
    }

    .footer-item {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-top: 2px solid var(--color-accent);
      border-radius: var(--radius-md);
      padding: var(--space-8);
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: var(--weight-black);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
    }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .modal-label {
      font-family: var(--font-display);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      letter-spacing: var(--tracking-wider);
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .modal-actions {
      display: flex;
      gap: var(--space-3);
      justify-content: flex-end;
      padding-top: var(--space-2);
    }

    /* ---- Toast ---- */
    .toast {
      position: fixed;
      bottom: var(--space-8);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border-bright);
      border-left: 3px solid var(--color-accent);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-5);
      font-size: var(--text-sm);
      color: var(--color-text-primary);
      opacity: 0;
      transition: all var(--duration-normal) var(--ease-out);
      z-index: 2000;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topbar">
  <div class="topbar-logo">SR<span>R</span> <span style="color:var(--color-text-muted);font-weight:400;font-size:var(--text-base);letter-spacing:normal;margin-left:4px;">Sim Race Radio</span></div>
  <div class="topbar-sep"></div>
</nav>

<!-- HERO -->
<div class="index-root">
  <main class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Sim Race<br/><em>Radio</em></h1>
    </div>

    <!-- ACTION CARDS -->
    <div class="action-cards">
      <div class="action-card primary">
        <div class="card-icon red">📡</div>
        <div class="card-title">New Session</div>
        <div class="card-desc">Start a new broadcast session and get a shareable key.</div>
        <button class="btn btn-primary active" id="create-btn">Create Session</button>
      </div>

      <div class="action-card">
        <div class="card-icon teal">🔑</div>
        <div class="card-title">Join Session</div>
        <div class="card-desc">Paste an existing session key to open the dashboard.</div>
        <button class="btn btn-ghost active" id="paste-btn">Paste Key</button>
      </div>
    </div>

    <!-- PASTE INPUT -->
    <div class="paste-card">
      <div class="panel" style="padding:var(--space-5) var(--space-6);">
        <div class="paste-row">
          <input
            type="text"
            id="paste-input"
            class="input"
            placeholder="Paste session key here — e.g. a1b2c3d4e5f6..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="btn btn-ghost active" id="go-btn" style="flex-shrink:0;">Go &#8594;</button>
        </div>
        <p class="paste-hint">Keys are auto-detected on paste — no need to press Go.</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-item">SRR v0.1</span>
  </footer>
</div>

<!-- CREATE SESSION MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-title">New Session</div>

    <div class="modal-field">
      <label class="modal-label" for="race-name-input">Race Name</label>
      <input class="input" id="race-name-input" type="text" placeholder="e.g. Round 4 — Spa-Francorchamps" />
    </div>

    <!-- later make a list of keys to create
    <div class="modal-field">
      <label class="modal-label">Default Permissions</label>
      <div style="display:flex;gap:var(--space-4);margin-top:var(--space-1);">
        <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-secondary);cursor:pointer;">
          <input type="checkbox" class="perm-check" checked data-perm="read" /> Read
        </label>
        <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-secondary);cursor:pointer;">
          <input type="checkbox" class="perm-check" data-perm="write" /> Write
        </label>
        <label style="display:flex;align-items:center;gap:var(--space-2);font-size:var(--text-sm);color:var(--color-text-secondary);cursor:pointer;">
          <input type="checkbox" class="perm-check" data-perm="admin" /> Admin
        </label>
      </div>
    </div>-->

    <div class="modal-actions">
      <button class="btn btn-ghost active" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary active" id="modal-create">Create &#8594;</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  // ---- Utility ----
  function showToast(msg, color) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    if (color) t.style.borderLeftColor = color;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function navigateToSession(key) {
    if (!/^[A-Za-z0-9_-]{16}$/.test(key)) {
      showToast('Invalid session key.', 'var(--color-danger)');
      return;
    } else {
      showToast('Key detected — navigating…', 'var(--color-teal)');
    }
    setTimeout(() => window.location.href = `/s/${encodeURIComponent(key.trim())}/`, 600);
  }

  // ---- Paste detection on the input field ----
  const pasteInput = document.getElementById('paste-input');

  pasteInput.addEventListener('paste', (e) => {
    // Small delay so value is updated after paste
    setTimeout(() => {
      const val = pasteInput.value.trim();
      if (val.length >= 6) {
        pasteInput.classList.add('detected');
        navigateToSession(val);
      }
    }, 50);
  });

  // Global paste detection (anywhere on the page, when input not focused)
  document.addEventListener('paste', (e) => {
    if (document.activeElement === pasteInput) return; // handled above
    const text = (e.clipboardData || window.clipboardData).getData('text');
    if (text && text.trim().length >= 6) {
      pasteInput.value = text.trim();
      pasteInput.classList.add('detected');
      navigateToSession(text.trim());
    }
  });

  document.getElementById("paste-btn").addEventListener("click", async () => {
      try {
          const text = await navigator.clipboard.readText();
          document.getElementById("paste-input").value = text;
          document.getElementById("paste-input").dispatchEvent(new Event("input"));
          showToast('Key detected — navigating…', 'var(--color-teal)');
          navigateToSession(text.trim());
      } catch (err) {
          showToast('Failed to read clipboard.', 'var(--color-danger)');
          console.error("Failed to read clipboard:", err);
          document.getElementById("paste-input").focus();
      }
  });

  // ---- Manual Go button ----
  document.getElementById('go-btn').addEventListener('click', () => {
    navigateToSession(pasteInput.value);
  });

  pasteInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') navigateToSession(pasteInput.value);
  });

  // ---- Create modal ----
  document.getElementById('create-btn').addEventListener('click', () => {
    document.getElementById('create-modal').classList.add('open');
  });

  document.getElementById('modal-cancel').addEventListener('click', () => {
    document.getElementById('create-modal').classList.remove('open');
  });

  document.getElementById('create-modal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  document.getElementById('modal-create').addEventListener('click', async (e) => {
    const raceName = document.getElementById('race-name-input').value.trim();

    e.target.classList.remove("active");
    const response = await fetch("/api/sessions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
          "race_name": raceName,
      }),
    });

    if (!response.ok) {
      showToast("Failed to create session!", "var(--color-danger)");
      e.target.classList.add("active");
      throw new Error("Failed to create session!");
    }

    const session = await response.json();
    navigateToSession(session.key);
  });
</script>
</body>
</html>
